services:
  lyric-search:
    build: .
    ports:
      - "8501:8501"
    volumes:
      # Mount your local data folder containing songs_lyrics_metadata.csv and songs.index
      # into /app/data inside the container. The app reads these via
      # LYRICS_CSV_PATH and LYRICS_INDEX_PATH (set in the Dockerfile).
      - ./data:/app/data:ro
    restart: unless-stopped
